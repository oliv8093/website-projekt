<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid-Gallery</title>
    <style>
        /* CSS RULES IMPORTS */
        @import url('https://fonts.googleapis.com/css2?family=Poiret+One&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap');
        /* VARIABLES DECLARATION */
        :root{
            --light: #f1f1f1;
            --dark: #282828;
            --articles: #fefefe;
            --headings: #6b85b8;
            --hero-blue: #76d1ff;
            --hero-green: #69ffcb;
            --hero-pink: #fb90ff;
        }
            /* make sizing predictable for grid items */
            *{ box-sizing: border-box; }
        body{
            font-family: "Poiret One", sans-serif;
            background-color: var(--light);
            color: var(--dark);
        }
        h1, h2, h3, p{
            font-weight: 500;
            margin: 0.7rem 0;
        }
        h1{
            font-family: "Bodoni Moda", serif;
            font-weight: 550;
        }
        #header-main{
            position: relative;
            background-color: var(--dark);
            color: var(--hero-blue);
            padding: 1rem;
        }
        #header-main h1, #header-main h2{
            margin: 0;
        }
        #header-main h2{
            color: var(--hero-pink);
        }
        #footer-main{
            background-color: var(--dark);
            color: var(--light);
            padding: 1rem;
        }
        /* GALLERY GRID */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.5rem;
            align-items: start;
            padding: 1rem 0.5rem;
            width: 100%;
            max-width: 100%;
        }
        .gallery-grid img{
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            border: 1px solid #e0e0e0;
            background-color: #fff;
        }
        @media (max-width: 400px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- GLOBAL HEADER -->
     <header id="header-main">
        <hgroup>
            <h1>Simple Gallery</h1>
            <h2>Using CSS - Grid</h2>
        </hgroup>
     </header>
    <!-- GLOBAL NAVIGATION -->
    <!-- GLOBAL CONTENT -->
     <main>
        <section class="gallery">
<h2>The gallery</h2>
<!-- GRID CONTANTINER-->
<div class="gallery-grid">
<img src="assets/img/Uploads-01.png" alt="">   
<img src="assets/img/Uploads-02.png" alt=""> 
<img src="assets/img/Uploads-03.png" alt=""> 
<img src="assets/img/Uploads-04.png" alt=""> 
<img src="assets/img/Uploads-05.png" alt=""> 
<img src="assets/img/Uploads-06.png" alt=""> 
<img src="assets/img/Uploads-07.png" alt=""> 
<img src="assets/img/Uploads-08.png" alt=""> 
<img src="assets/img/Uploads-09.png" alt=""> 
</div>
</section>
     </main>
    <!-- GLOBAL FOOTER -->
     <footer id="footer-main">
        SOMEDAY THE FOOTER GOES HERE
     </footer>
</body>
</html>
